<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1만시간 영어 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060608;
    --surface: #0e0e14;
    --card: #13131c;
    --border: #1e1e2e;
    --border2: #2a2a40;
    --gold: #f5c842;
    --gold2: #e8a820;
    --teal: #38d9a0;
    --blue: #4da6ff;
    --red: #ff5f5f;
    --text: #eeeef8;
    --muted: #6060a0;
    --muted2: #9090b8;
    --checked: rgba(56,217,160,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 0 0 100px;
  }

  /* ─── HERO ─── */
  .hero {
    background: linear-gradient(160deg, #0d0d18 0%, #060608 60%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .hero-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .hero-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--gold);
  }

  .hero-left p {
    font-size: 12px;
    color: var(--muted2);
    letter-spacing: 1px;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .stats-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat-box {
    text-align: center;
    min-width: 80px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    line-height: 1;
  }

  .stat-val.gold { color: var(--gold); }
  .stat-val.teal { color: var(--teal); }
  .stat-val.blue { color: var(--blue); }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ─── MASTER PROGRESS BAR ─── */
  .master-bar-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    margin-top: -1px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding-top: 12px;
    padding-bottom: 14px;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .bar-labels span { color: var(--muted2); }

  .master-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .master-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--gold));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    min-width: 0;
  }

  /* milestones */
  .milestone-dots {
    position: relative;
    height: 16px;
    margin-top: 4px;
  }

  .mdot {
    position: absolute;
    transform: translateX(-50%);
    text-align: center;
  }

  .mdot-line {
    width: 1px;
    height: 6px;
    background: var(--border2);
    margin: 0 auto;
  }

  .mdot-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    white-space: nowrap;
  }

  .mdot.reached .mdot-line { background: var(--teal); }
  .mdot.reached .mdot-label { color: var(--teal); }

  /* ─── CONTENT ─── */
  .content {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* ─── CONTROLS ─── */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .ctrl-btn {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
  .ctrl-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

  .search-input {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    outline: none;
    width: 160px;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--muted); }

  .ctrl-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }

  /* ─── PHASE SECTIONS ─── */
  .phase {
    margin-bottom: 32px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }

  .phase-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 3px 10px;
    border: 1px solid;
  }

  .phase-1 .phase-badge { color: #5ab0ff; border-color: #5ab0ff; }
  .phase-2 .phase-badge { color: var(--teal); border-color: var(--teal); }
  .phase-3 .phase-badge { color: var(--gold); border-color: var(--gold); }
  .phase-4 .phase-badge { color: var(--red); border-color: var(--red); }

  .phase-title {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }

  .phase-progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
  }

  .phase-mini-bar {
    flex-shrink: 0;
    width: 80px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .phase-mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .phase-1 .phase-mini-fill { background: #5ab0ff; }
  .phase-2 .phase-mini-fill { background: var(--teal); }
  .phase-3 .phase-mini-fill { background: var(--gold); }
  .phase-4 .phase-mini-fill { background: var(--red); }

  .phase-toggle { color: var(--muted); font-size: 12px; transition: transform 0.3s; }
  .phase.collapsed .phase-toggle { transform: rotate(-90deg); }

  /* ─── WEEK GROUPS ─── */
  .week-group {
    margin-bottom: 4px;
  }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
    padding-left: 2px;
  }

  /* ─── DAY GRID ─── */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  @media (max-width: 600px) {
    .day-grid { grid-template-columns: repeat(5, 1fr); }
  }

  /* ─── DAY CELL ─── */
  .day-cell {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 6px 7px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    min-height: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    text-align: center;
  }

  .day-cell:hover {
    border-color: var(--gold);
    background: rgba(245,200,66,0.06);
    transform: translateY(-1px);
  }

  .day-cell.checked {
    background: var(--checked);
    border-color: var(--teal);
  }

  .day-cell.checked .day-num { color: var(--teal); }

  .day-cell.today {
    border-color: var(--gold) !important;
    box-shadow: 0 0 0 1px var(--gold);
  }

  .day-cell.future {
    opacity: 0.35;
    cursor: default;
  }

  .day-cell.future:hover {
    transform: none;
    border-color: var(--border);
    background: var(--card);
  }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted2);
    line-height: 1;
  }

  .day-total {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }

  .day-cell.checked .day-total { color: var(--teal); opacity: 0.8; }

  .check-icon {
    font-size: 14px;
    line-height: 1;
    display: none;
  }

  .day-cell.checked .check-icon { display: block; }
  .day-cell.checked .day-num { display: none; }

  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ─── PHASE COLLAPSED ─── */
  .phase.collapsed .day-grid,
  .phase.collapsed .week-group,
  .phase.collapsed .week-label { display: none; }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border2);
    padding: 32px;
    width: 360px;
    max-width: 95vw;
    animation: popIn 0.25s ease;
  }

  @keyframes popIn {
    from { opacity:0; transform: scale(0.92) translateY(10px); }
    to { opacity:1; transform: scale(1) translateY(0); }
  }

  .modal-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--gold);
    line-height: 1;
  }

  .modal-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 1px;
    margin-bottom: 24px;
  }

  .modal-section {
    margin-bottom: 20px;
  }

  .modal-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .hours-picker {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .hour-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .hour-btn:hover { border-color: var(--gold); color: var(--gold); }
  .hour-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); }

  .note-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    resize: none;
    height: 64px;
    transition: border-color 0.2s;
  }

  .note-input:focus { border-color: var(--gold); }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }

  .btn-confirm {
    flex: 1;
    background: var(--teal);
    border: none;
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .btn-confirm:hover { opacity: 0.85; }

  .btn-uncheck {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-uncheck:hover { border-color: var(--red); color: var(--red); }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--muted2); color: var(--text); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--teal);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 12px 28px;
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── EMPTY STATE ─── */
  .empty-msg {
    text-align: center;
    padding: 60px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }

  /* ─── PHOTO UPLOAD ─── */
  .photo-upload-area {
    border: 1.5px dashed var(--border2);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
    margin-top: 4px;
  }
  .photo-upload-area:hover { border-color: var(--gold); }
  .photo-upload-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .photo-upload-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 1px;
    pointer-events: none;
  }
  .photo-preview-wrap {
    margin-top: 8px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .photo-thumb {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border: 1px solid var(--border2);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .photo-thumb:hover { border-color: var(--gold); }
  .photo-thumb-wrap {
    position: relative;
  }
  .photo-remove {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 9px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .day-cell.has-photo::after {
    content: '📷';
    position: absolute;
    top: 2px; right: 3px;
    font-size: 8px;
  }

  /* ─── GALLERY ─── */
  .gallery-btn {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .gallery-btn:hover { background: var(--gold); color: #000; }

  .gallery-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 9998;
    overflow-y: auto;
    padding: 40px 20px 80px;
  }
  .gallery-overlay.open { display: block; }

  .gallery-inner {
    max-width: 860px;
    margin: 0 auto;
  }

  .gallery-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .gallery-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--gold);
    letter-spacing: 3px;
  }

  .gallery-close {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .gallery-close:hover { border-color: var(--red); color: var(--red); }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .gallery-item {
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .gallery-item:hover { border-color: var(--gold); transform: translateY(-2px); }

  .gallery-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
  }

  .gallery-info {
    padding: 8px 10px;
  }

  .gallery-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 1px;
    line-height: 1;
  }

  .gallery-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .gallery-note-preview {
    font-size: 11px;
    color: var(--muted2);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
  }

  .gallery-note-full {
    font-size: 12px;
    color: var(--muted2);
    margin-top: 6px;
    line-height: 1.6;
    font-weight: 300;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .gallery-note-empty {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .gallery-img-empty {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    border-bottom: 1px solid var(--border);
  }

  .gallery-thumb-sm {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border: 1px solid var(--border2);
    cursor: pointer;
    margin-right: 4px;
    margin-top: 4px;
  }

  .gallery-extra-photos {
    display: flex;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .gallery-empty {
    text-align: center;
    padding: 80px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    z-index: 99999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 75vh;
    object-fit: contain;
    border: 1px solid var(--border2);
  }
  .lightbox-info {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted2);
    text-align: center;
  }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
  }
  .lightbox-close:hover { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <h1>10,000H TRACKER</h1>
      <p>하루 2시간 · 매일 꾸준히 · 영어 마스터 플랜</p>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val gold" id="stat-hours">0</div>
        <div class="stat-label">누적시간</div>
      </div>
      <div class="stat-box">
        <div class="stat-val teal" id="stat-days">0</div>
        <div class="stat-label">완료일수</div>
      </div>
      <div class="stat-box">
        <div class="stat-val blue" id="stat-streak">0</div>
        <div class="stat-label">연속일수</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-pct" style="color:var(--muted2)">0%</div>
        <div class="stat-label">달성률</div>
      </div>
    </div>
  </div>
</div>

<!-- MASTER BAR -->
<div class="master-bar-wrap">
  <div class="bar-labels">
    <span>0H</span>
    <span id="bar-current-label" style="color:var(--gold)">0 / 10,000H</span>
    <span>10,000H</span>
  </div>
  <div class="master-bar">
    <div class="master-fill" id="master-fill" style="width:0%"></div>
  </div>
  <div class="milestone-dots" id="milestone-dots"></div>
</div>

<!-- CONTENT -->
<div class="content">
  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn active" onclick="filterPhase('all', this)">전체</button>
    <button class="ctrl-btn" onclick="filterPhase(1, this)">기초</button>
    <button class="ctrl-btn" onclick="filterPhase(2, this)">일상</button>
    <button class="ctrl-btn" onclick="filterPhase(3, this)">비즈니스</button>
    <button class="ctrl-btn" onclick="filterPhase(4, this)">전문가</button>
    <span class="ctrl-label" id="remain-label">남은 시간: 10,000H</span>
    <button class="gallery-btn" onclick="openGallery()">📖 기록 모아보기</button>
  </div>

  <!-- PHASES -->
  <div id="phases-container"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-day" id="modal-day-num">DAY 1</div>
    <div class="modal-subtitle" id="modal-date-str">—</div>

    <div class="modal-section">
      <div class="modal-label">오늘 학습한 시간</div>
      <div class="hours-picker" id="hours-picker">
        <button class="hour-btn" onclick="selectHours(0.5, this)">0.5h</button>
        <button class="hour-btn selected" onclick="selectHours(1, this)">1h</button>
        <button class="hour-btn" onclick="selectHours(1.5, this)">1.5h</button>
        <button class="hour-btn" onclick="selectHours(2, this)">2h ★</button>
        <button class="hour-btn" onclick="selectHours(2.5, this)">2.5h</button>
        <button class="hour-btn" onclick="selectHours(3, this)">3h</button>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-label">메모 (선택)</div>
      <textarea class="note-input" id="modal-note" placeholder="오늘 공부한 내용을 적어보세요..."></textarea>
    </div>

    <div class="modal-section">
      <div class="modal-label">인증샷 (선택)</div>
      <div class="photo-upload-area" id="photo-upload-area">
        <input type="file" accept="image/*" multiple id="photo-file-input" onchange="handlePhotoUpload(event)">
        <div class="photo-upload-label">📷 사진을 클릭하거나 드래그해서 업로드</div>
      </div>
      <div class="photo-preview-wrap" id="photo-preview-wrap"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-confirm" onclick="confirmCheck()">✓ 완료 체크</button>
      <button class="btn-uncheck" id="btn-uncheck" onclick="doUncheck()" style="display:none">취소</button>
      <button class="btn-cancel" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery-overlay" id="gallery-overlay">
  <div class="gallery-inner">
    <div class="gallery-header">
      <div class="gallery-title">📖 공부 기록 모아보기</div>
      <button class="gallery-close" onclick="closeGallery()">✕ 닫기</button>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕ 닫기</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-info" id="lightbox-info"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───
const TOTAL_HOURS = 10000;
const DAILY_HOURS = 2;
const TOTAL_DAYS = Math.ceil(TOTAL_HOURS / DAILY_HOURS); // 5000 days

const PHASES = [
  { id: 1, name: '기초 생존 회화', color: '#5ab0ff', targetH: 500,  days: 250, desc: 'A1~A2 · 인사·자기소개·일상 표현' },
  { id: 2, name: '일상 대화 가능', color: '#38d9a0', targetH: 2000, days: 750, desc: 'B1~B2 · 자유로운 일상 소통 (토익700+)' },
  { id: 3, name: '비즈니스 유창', color: '#f5c842', targetH: 5000, days: 1500, desc: 'C1 · 업무·발표·협상 (토익900+)' },
  { id: 4, name: '원어민급 전문가', color: '#ff5f5f', targetH: 10000, days: 2500, desc: 'C2 · 완전 구사, 원어민 동등 수준' },
];

const MILESTONES = [
  { h: 500,  label: '500H 기초' },
  { h: 2000, label: '2000H 일상' },
  { h: 5000, label: '5000H 비즈' },
  { h: 10000, label: '10000H 완성' },
];

// ─── STATE ───
const DATA_KEY = 'eng10k_data_v3';
const PHOTO_KEY = 'eng10k_photos_v3';
let data = {};   // { dayIndex: { hours: 2, note: '...', date: '...' } }
let photos = {}; // { dayIndex: ['dataURL', ...] }
let openDay = null;
let selectedHours = 2;
let currentFilter = 'all';
let pendingPhotos = []; // base64 strings for current modal session

// ─── STORAGE ───
function save() {
  try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); } catch(e) {}
}

function savePhotos() {
  try { localStorage.setItem(PHOTO_KEY, JSON.stringify(photos)); } catch(e) {
    showToast('⚠️ 저장 공간 부족! 사진을 줄여주세요');
  }
}

function load() {
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (raw) data = JSON.parse(raw);
    const rawP = localStorage.getItem(PHOTO_KEY);
    if (rawP) photos = JSON.parse(rawP);
  } catch(e) { data = {}; photos = {}; }
}

// ─── DATE HELPERS ───
const startDate = new Date(2026, 2, 6); // 2026-03-06

function dayIndexToDate(idx) {
  const d = new Date(startDate);
  d.setDate(d.getDate() + idx);
  return d;
}

function formatDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function formatDateFull(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}

function todayIndex() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(startDate);
  start.setHours(0,0,0,0);
  return Math.floor((today - start) / 86400000);
}

// ─── COMPUTE STATS ───
function computeStats() {
  const checkedDays = Object.keys(data).map(Number);
  const totalHours = checkedDays.reduce((s, d) => s + (data[d].hours || 2), 0);
  const totalDays = checkedDays.length;
  const pct = Math.min(100, (totalHours / TOTAL_HOURS * 100));

  // streak
  const ti = todayIndex();
  let streak = 0;
  for (let i = ti; i >= 0; i--) {
    if (data[i]) streak++;
    else break;
  }

  return { totalHours, totalDays, pct, streak };
}

// ─── RENDER STATS ───
function renderStats() {
  const { totalHours, totalDays, pct, streak } = computeStats();
  document.getElementById('stat-hours').textContent = totalHours.toLocaleString();
  document.getElementById('stat-days').textContent = totalDays.toLocaleString();
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-pct').textContent = pct.toFixed(1) + '%';
  document.getElementById('bar-current-label').textContent = `${totalHours.toLocaleString()} / 10,000H`;
  document.getElementById('master-fill').style.width = pct + '%';
  document.getElementById('remain-label').textContent = `남은 시간: ${Math.max(0, TOTAL_HOURS - totalHours).toLocaleString()}H`;

  // milestones
  const dots = document.getElementById('milestone-dots');
  dots.innerHTML = MILESTONES.map(m => {
    const pctM = (m.h / TOTAL_HOURS * 100);
    const reached = totalHours >= m.h;
    return `<div class="mdot${reached?' reached':''}" style="left:${pctM}%">
      <div class="mdot-line"></div>
      <div class="mdot-label">${m.label}</div>
    </div>`;
  }).join('');
}

// ─── BUILD PHASES ───
function buildPhases() {
  const container = document.getElementById('phases-container');
  container.innerHTML = '';

  let dayOffset = 0;

  PHASES.forEach(phase => {
    if (currentFilter !== 'all' && currentFilter !== phase.id) {
      dayOffset += phase.days;
      return;
    }

    const phaseEl = document.createElement('div');
    phaseEl.className = `phase phase-${phase.id}`;
    phaseEl.dataset.phase = phase.id;

    // count checked in phase
    let phaseChecked = 0, phaseHours = 0;
    for (let i = 0; i < phase.days; i++) {
      const di = dayOffset + i;
      if (data[di]) { phaseChecked++; phaseHours += data[di].hours || 2; }
    }
    const phasePct = Math.min(100, phaseHours / phase.targetH * 100);

    phaseEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase(this)">
        <span class="phase-badge">PHASE ${phase.id}</span>
        <div>
          <div class="phase-title">${phase.name}</div>
          <div style="font-size:11px;color:var(--muted);font-weight:300;margin-top:2px">${phase.desc}</div>
        </div>
        <div class="phase-progress-text">${phaseChecked}/${phase.days}일 · ${phaseHours}H/${phase.targetH}H</div>
        <div class="phase-mini-bar"><div class="phase-mini-fill" style="width:${phasePct}%"></div></div>
        <span class="phase-toggle">▾</span>
      </div>
      <div class="phase-body" id="phase-body-${phase.id}"></div>
    `;

    container.appendChild(phaseEl);

    // build day cells in weeks
    const body = document.getElementById(`phase-body-${phase.id}`);
    const ti = todayIndex();

    let weekStart = dayOffset;
    while (weekStart < dayOffset + phase.days) {
      const weekEnd = Math.min(weekStart + 7, dayOffset + phase.days);
      const weekNum = Math.floor((weekStart - dayOffset) / 7) + 1;

      const weekGroup = document.createElement('div');
      weekGroup.className = 'week-group';

      // Month label every ~4 weeks or at start
      if ((weekNum - 1) % 4 === 0) {
        const d = dayIndexToDate(weekStart);
        const lbl = document.createElement('div');
        lbl.className = 'week-label';
        lbl.textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 — WEEK ${weekNum}`;
        weekGroup.appendChild(lbl);
      }

      const grid = document.createElement('div');
      grid.className = 'day-grid';

      for (let di = weekStart; di < weekEnd; di++) {
        const dayNum = di + 1;
        const d = dayIndexToDate(di);
        const checked = !!data[di];
        const hasPhoto = photos[di] && photos[di].length > 0;
        const isToday = di === ti;
        const isFuture = di > ti;

        const cell = document.createElement('div');
        cell.className = `day-cell${checked?' checked':''}${isToday?' today':''}${isFuture?' future':''}${hasPhoto?' has-photo':''}`;
        cell.dataset.day = di;

        const cumulH = getCumulativeHoursUpTo(di);

        cell.innerHTML = `
          <div class="check-icon">✓</div>
          <div class="day-num">${dayNum}</div>
          <div class="day-date">${formatDate(d)}</div>
          <div class="day-total">${cumulH}H</div>
        `;

        if (!isFuture) {
          cell.addEventListener('click', () => openModal(di));
        }

        grid.appendChild(cell);
      }

      weekGroup.appendChild(grid);
      body.appendChild(weekGroup);
      weekStart = weekEnd;
    }

    dayOffset += phase.days;
  });

  if (container.innerHTML === '') {
    container.innerHTML = '<div class="empty-msg">필터를 변경하거나 전체를 선택해주세요.</div>';
  }
}

function getCumulativeHoursUpTo(dayIndex) {
  let total = 0;
  for (let i = 0; i <= dayIndex; i++) {
    if (data[i]) total += data[i].hours || 2;
  }
  return total;
}

// ─── TOGGLE PHASE ───
function togglePhase(header) {
  const phase = header.closest('.phase');
  phase.classList.toggle('collapsed');
}

// ─── FILTER ───
function filterPhase(phase, btn) {
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = phase;
  buildPhases();
}

// ─── MODAL ───
function openModal(dayIndex) {
  openDay = dayIndex;
  selectedHours = data[dayIndex] ? (data[dayIndex].hours || 2) : 2;
  pendingPhotos = photos[dayIndex] ? [...photos[dayIndex]] : [];

  const d = dayIndexToDate(dayIndex);
  document.getElementById('modal-day-num').textContent = `DAY ${dayIndex + 1}`;
  document.getElementById('modal-date-str').textContent = formatDateFull(d);
  document.getElementById('modal-note').value = data[dayIndex] ? (data[dayIndex].note || '') : '';

  // hours picker
  document.querySelectorAll('.hour-btn').forEach(b => {
    b.classList.remove('selected');
    if (parseFloat(b.dataset.h || b.textContent) === selectedHours) b.classList.add('selected');
  });

  document.querySelectorAll('.hour-btn').forEach(b => {
    const v = parseFloat(b.textContent);
    if (v === selectedHours) b.classList.add('selected');
    else b.classList.remove('selected');
  });

  document.getElementById('btn-uncheck').style.display = data[dayIndex] ? 'block' : 'none';
  renderPhotoPreviews();
  document.getElementById('modal-overlay').classList.add('open');
}

// ─── PHOTO HANDLING ───
function handlePhotoUpload(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingPhotos.push(e.target.result);
      renderPhotoPreviews();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderPhotoPreviews() {
  const wrap = document.getElementById('photo-preview-wrap');
  wrap.innerHTML = '';
  pendingPhotos.forEach((src, idx) => {
    const w = document.createElement('div');
    w.className = 'photo-thumb-wrap';
    w.innerHTML = `
      <img class="photo-thumb" src="${src}" onclick="openLightboxDirect('${src}', '')">
      <button class="photo-remove" onclick="removePhoto(${idx})">✕</button>
    `;
    wrap.appendChild(w);
  });
}

function removePhoto(idx) {
  pendingPhotos.splice(idx, 1);
  renderPhotoPreviews();
}

function selectHours(h, btn) {
  selectedHours = h;
  document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function confirmCheck() {
  if (openDay === null) return;
  const note = document.getElementById('modal-note').value;
  data[openDay] = { hours: selectedHours, note, date: dayIndexToDate(openDay).toISOString() };
  if (pendingPhotos.length > 0) {
    photos[openDay] = [...pendingPhotos];
  } else if (photos[openDay] && pendingPhotos.length === 0) {
    // keep existing if no new ones added — already in pendingPhotos from load
    photos[openDay] = [...pendingPhotos];
  }
  save();
  savePhotos();
  closeModal();
  buildPhases();
  renderStats();
  showToast(`✓ DAY ${openDay+1} 완료! +${selectedHours}시간`);
}

function doUncheck() {
  if (openDay === null) return;
  delete data[openDay];
  delete photos[openDay];
  save();
  savePhotos();
  closeModal();
  buildPhases();
  renderStats();
  showToast(`DAY ${openDay+1} 체크 해제됨`);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  openDay = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ─── TOAST ───
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── GALLERY ───
function openGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';

  // 체크된 날 전체 (사진 있든 없든)
  const entries = Object.keys(data)
    .map(Number)
    .sort((a, b) => b - a);

  if (entries.length === 0) {
    grid.innerHTML = '<div class="gallery-empty" style="grid-column:1/-1">아직 기록이 없어요 📝<br><br>날짜를 클릭해서 공부 기록을 남겨보세요!</div>';
  } else {
    entries.forEach(di => {
      const d = dayIndexToDate(di);
      const note = data[di] ? (data[di].note || '') : '';
      const hours = data[di] ? (data[di].hours || 2) : 2;
      const dayPhotos = photos[di] || [];

      const item = document.createElement('div');
      item.className = 'gallery-item';

      const photoHTML = dayPhotos.length > 0
        ? `<img class="gallery-img" src="${dayPhotos[0]}" onclick="openLightboxDirect('${dayPhotos[0]}', 'DAY ${di+1} · ${formatDateFull(d)}')">`
        : `<div class="gallery-img-empty">📝</div>`;

      const extraPhotos = dayPhotos.length > 1
        ? `<div class="gallery-extra-photos">${dayPhotos.slice(1).map((src,i) =>
            `<img class="gallery-thumb-sm" src="${src}" onclick="openLightboxDirect('${src}','DAY ${di+1}')">`
          ).join('')}</div>` : '';

      item.innerHTML = `
        ${photoHTML}
        <div class="gallery-info">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="gallery-day">DAY ${di+1}</div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--teal)">${hours}H</div>
          </div>
          <div class="gallery-date">${formatDateFull(d)}</div>
          ${note ? `<div class="gallery-note-full">${note}</div>` : '<div class="gallery-note-empty">메모 없음</div>'}
          ${extraPhotos}
          ${dayPhotos.length > 1 ? `<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px">사진 ${dayPhotos.length}장</div>` : ''}
        </div>
      `;
      grid.appendChild(item);
    });
  }

  document.getElementById('gallery-overlay').classList.add('open');
}

function closeGallery() {
  document.getElementById('gallery-overlay').classList.remove('open');
}

// ─── LIGHTBOX ───
function openLightboxDirect(src, info) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-info').textContent = info;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ─── INIT ───
load();
renderStats();
buildPhases();

// Auto-scroll to today
setTimeout(() => {
  const todayCell = document.querySelector('.day-cell.today');
  if (todayCell) {
    todayCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}, 400);
</script>
</body>
</html>
